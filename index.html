    <meta property="og:description" content="Tanmay Kalbande is a data science enthusiast with a solid foundation in statistical analysis, machine learning, and data visualization. Ready to contribute to meaningful insights and data-driven decision-making.">

    <!-- Favicon and Fonts -->

    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/continentalstorage888-ops/didactic-meme@main/portfolio%201.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap">

    <!-- New UI Styles -->
    <style>
        :root {
            --background: #0c0a09; /* stone-950 */
            --text: #e7e5e4; /* stone-200 */
            --accent: #f59e0b; /* amber-500 */
            --loader-bg: #44403c; /* stone-700 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 1s ease-out;
        }
        
        .icon-container {
            animation: spin 4s linear infinite;
        }

        .aperture-icon {
            width: 96px; /* 6rem */
            height: 96px;
            stroke: var(--accent);
            stroke-width: 8;
            stroke-linecap: round;
            fill: none;
        }

        .title {
            font-size: 1.125rem; /* 18px */
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }
        
        .loading-bar-container {
            width: 256px; /* 16rem */
            height: 6px;
            background-color: var(--loader-bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-bar {
            width: 100%;
            height: 100%;
            background-color: var(--accent);
            border-radius: 3px;
            transform-origin: left;
            animation: load 2.2s ease-in-out forwards 0.8s;
            transform: scaleX(0);
        }
        
        .message {
            font-size: 0.75rem; /* 12px */
            color: #a8a29e; /* stone-400 */
            margin-top: -1rem; /* bring it closer to the loading bar */
            animation: fadeIn 1s ease-out 1s;
            animation-fill-mode: backwards;
        }
        
        /* Keyframe Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes load {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <!-- SVG version of the Aperture Icon for consistency -->
            <svg class="aperture-icon" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40"/>
            </svg>
        </div>
        <h1 class="title">Portfolio OS</h1>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <p class="message">Redirecting to the main experience...</p>
    </div>

    <script>
        // This is a backup redirect in case the meta tag fails
        setTimeout(function() {
            window.location.replace("https://tanmay-kalbande.vercel.app/");
        }, 3000); // 3-second delay matches the meta tag
    </script>

</body>
</html>
